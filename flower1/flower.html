<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi tặng em</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Dancing Script', cursive;
  }
  #canvas-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  #message {
    position: absolute;
    bottom: 6vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
  }
  #message .line1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.4rem, 4vw, 2.6rem);
    color: #ffb3c6;
    letter-spacing: 0.04em;
    text-shadow:
      0 0 18px rgba(255, 100, 130, 0.9),
      0 0 40px rgba(255, 60, 100, 0.5),
      0 0 80px rgba(255, 30, 80, 0.25);
    animation: textGlow 3s ease-in-out infinite alternate, fadeInUp 2s ease 0.5s forwards;
    opacity: 0;
  }
  #message .hearts {
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    color: #ff6b8a;
    animation: heartBeat 1.4s ease-in-out infinite, fadeInUp 2s ease 1s forwards;
    opacity: 0;
    display: block;
    margin-top: 6px;
    letter-spacing: 0.3em;
    text-shadow: 0 0 12px rgba(255, 80, 120, 0.8);
  }
  @keyframes textGlow {
    from { text-shadow: 0 0 18px rgba(255,100,130,0.9), 0 0 40px rgba(255,60,100,0.5); }
    to   { text-shadow: 0 0 28px rgba(255,150,180,1),   0 0 70px rgba(255,80,130,0.8), 0 0 120px rgba(255,40,100,0.4); }
  }
  @keyframes heartBeat {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  /* Particle overlay */
  #particles {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
  }
  .petal-particle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: petalFall linear infinite;
  }
  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div id="canvas-container">
  <canvas id="webgl"></canvas>
  <div id="particles"></div>
  <div id="message">
    <span class="line1">Gửi tặng em bé 20 tuổi của anh !!!</span>
    <span class="hearts">❤ ❤ ❤</span>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Petal particles ────────────────────────────────────────────────────
const container = document.getElementById('particles');
const colors = ['#ff6b8a','#ff9eb5','#ffb3c6','#ff4d79','#ff85a1','#ffc2d1'];
for (let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'petal-particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.top   = '-10px';
  p.style.background = colors[Math.floor(Math.random() * colors.length)];
  p.style.animationDuration = (6 + Math.random() * 10) + 's';
  p.style.animationDelay   = (Math.random() * 12) + 's';
  p.style.width  = (4 + Math.random() * 7) + 'px';
  p.style.height = (4 + Math.random() * 7) + 'px';
  container.appendChild(p);
}
// ─── Three.js Scene ─────────────────────────────────────────────────────
const canvas = document.getElementById('webgl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1, 9);
camera.lookAt(0, 0.5, 0);
// Ambient + point lights
scene.add(new THREE.AmbientLight(0x110008, 1));
const pinkLight = new THREE.PointLight(0xff3366, 3, 20);
pinkLight.position.set(2, 3, 3);
scene.add(pinkLight);
const roseLight = new THREE.PointLight(0xff80aa, 2, 15);
roseLight.position.set(-2, 2, 2);
scene.add(roseLight);
const greenLight = new THREE.PointLight(0x00ff88, 1.5, 12);
greenLight.position.set(0, -2, 2);
scene.add(greenLight);
// Inner glow light (brightens during bloom)
const innerGlow = new THREE.PointLight(0xffdd88, 0, 8);
innerGlow.position.set(0, 0.3, 0);
scene.add(innerGlow);
// ── Helpers ──────────────────────────────────────────────────────────────
function tubeLine(points, color, radius = 0.025, segments = 8) {
  const curve = new THREE.CatmullRomCurve3(points);
  const geo   = new THREE.TubeGeometry(curve, 30, radius, segments, false);
  const mat   = new THREE.MeshPhongMaterial({
    color, emissive: color, emissiveIntensity: 0.35,
    shininess: 80, transparent: true, opacity: 0.92
  });
  return new THREE.Mesh(geo, mat);
}
// Easing functions
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutQuart(t) { return t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t+2,4)/2; }
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10*t) * Math.sin((t*10 - 0.75) * (2*Math.PI)/3) + 1;
}
// ── Stem ─────────────────────────────────────────────────────────────────
const stemPts = [
  new THREE.Vector3(0, -3.2, 0),
  new THREE.Vector3(0.1, -2.2, 0.1),
  new THREE.Vector3(-0.05, -1.2, 0.05),
  new THREE.Vector3(0, 0, 0)
];
scene.add(tubeLine(stemPts, 0x228833, 0.045, 6));
// ── Leaves ───────────────────────────────────────────────────────────────
function addLeaf(startY, side, tilt) {
  const s = side;
  const pts = [
    new THREE.Vector3(0, startY, 0),
    new THREE.Vector3(s*0.5, startY + 0.3, tilt * 0.2),
    new THREE.Vector3(s*1.1, startY + 0.5, tilt * 0.5),
    new THREE.Vector3(s*1.5, startY + 0.3, tilt * 0.3),
    new THREE.Vector3(s*1.0, startY + 0.1, 0)
  ];
  scene.add(tubeLine(pts, 0x33bb44, 0.03, 5));
  for (let t = 0.2; t < 0.9; t += 0.2) {
    const mid = new THREE.Vector3().lerpVectors(pts[0], pts[3], t);
    const vein = [
      mid.clone(),
      new THREE.Vector3(mid.x, mid.y + 0.15, mid.z + s * 0.12)
    ];
    scene.add(tubeLine(vein, 0x55dd66, 0.012, 4));
  }
}
addLeaf(-1.8,  1,  0.3);
addLeaf(-1.8, -1, -0.3);
addLeaf(-1.0,  1,  0.5);
// ── Rose Petals with Bloom Data ──────────────────────────────────────────
const flowerGroup = new THREE.Group();
scene.add(flowerGroup);
const petalColors = [0xff2255, 0xff4477, 0xff6699, 0xff99bb, 0xffaac8, 0xffbbcc];
// Store petal animation data
const petalAnimData = [];
function makePetal(angleY, layer, openness, colorHex) {
  const petalGroup = new THREE.Group();
  petalGroup.rotation.y = angleY;
  const spread  = openness;
  const length  = 0.6 + layer * 0.18;
  const arch    = 0.5 + layer * 0.1;
  const baseZ   = layer * 0.08;
  // 3 ribs per petal
  for (let r = -1; r <= 1; r++) {
    const xOff = r * 0.12 * length;
    const pts = [
      new THREE.Vector3(xOff * 0.2, 0, baseZ),
      new THREE.Vector3(xOff * 0.6, length * 0.3 * spread + arch * 0.3, baseZ + length * 0.4), //
      new THREE.Vector3(xOff,       length * spread,                    baseZ + length * 0.1),
      new THREE.Vector3(xOff * 0.5, length * spread + arch * spread,   baseZ - length * 0.15)
    ];
    petalGroup.add(tubeLine(pts, colorHex, 0.022, 5));
  }
  // cross veins
  for (let v = 0.25; v < 0.9; v += 0.25) {
    const leftRib  = new THREE.Vector3(-0.12 * length, length * v * spread, baseZ + length * (0.4 - v * 0.3));
    const rightRib = new THREE.Vector3( 0.12 * length, length * v * spread, baseZ + length * (0.4 - v * 0.3));
    petalGroup.add(tubeLine([leftRib, rightRib], colorHex, 0.012, 4));
  }
  return petalGroup;
}
// Build rose layers
const layerCount     = 6;
const petalsPerLayer = [5, 6, 7, 8, 9, 10];
const openness       = [0.05, 0.18, 0.38, 0.62, 0.82, 1.0];
const targetTilt     = [0.05, 0.15, 0.28, 0.4, 0.52, 0.62]; // final tilt when fully bloomed
// Bloom timing: each layer starts blooming at a staggered delay
// Inner layers bloom first, outer layers follow
const BLOOM_DURATION = 8;       // total seconds for full bloom
const LAYER_STAGGER  = 1.0;     // seconds between each layer starting
for (let L = 0; L < layerCount; L++) {
  const n     = petalsPerLayer[L];
  const color = petalColors[Math.min(L, petalColors.length - 1)];
  for (let i = 0; i < n; i++) {
    const angle  = (i / n) * Math.PI * 2 + L * 0.31;
    const petal  = makePetal(angle, L, openness[L], color);
    // Start CLOSED: all petals nearly vertical (very small tilt)
    petal.rotation.x = -0.02; // nearly upright = closed bud
    // Store bloom animation metadata
    const bloomDelay = L * LAYER_STAGGER; // inner layers start first
    const bloomDur   = 3.0 + L * 0.5;    // outer layers take longer to open
    const jitter     = (Math.random() - 0.5) * 0.3; // slight randomness per petal
    petalAnimData.push({
      group: petal,
      layer: L,
      index: i,
      targetTilt: targetTilt[L],
      startTilt: -0.02,
      bloomDelay: bloomDelay + jitter * 0.3,
      bloomDuration: bloomDur,
      // Also animate scale: start small, grow to full
      targetScaleY: 1.0,
      startScaleY: 0.3 + L * 0.05,
      // Per-petal subtle sway offset
      swayPhase: Math.random() * Math.PI * 2,
      swayAmount: 0.015 + Math.random() * 0.01,
    });
    // Start with small scale (bud)
    petal.scale.set(1, 0.3 + L * 0.05, 1);
    flowerGroup.add(petal);
  }
}
// Center stamen dots — also start hidden, reveal during bloom
const stamenMeshes = [];
for (let i = 0; i < 18; i++) {
  const a = (i / 18) * Math.PI * 2;
  const r = Math.random() * 0.18;
  const geo = new THREE.SphereGeometry(0.03 + Math.random() * 0.02, 6, 6);
  const mat = new THREE.MeshPhongMaterial({
    color: 0xffee44, emissive: 0xffcc00, emissiveIntensity: 0.6,
    transparent: true, opacity: 0
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(Math.cos(a) * r, 0.05, Math.sin(a) * r);
  m.scale.set(0.01, 0.01, 0.01); // start invisible
  stamenMeshes.push(m);
  flowerGroup.add(m);
}
// Position flower at top of stem
flowerGroup.position.set(0, 0.1, 0);
flowerGroup.rotation.x = -0.15;
// ── Sparkle stars ─────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 220;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i += 3) {
  starPos[i]   = (Math.random() - 0.5) * 18;
  starPos[i+1] = (Math.random() - 0.5) * 12 + 1;
  starPos[i+2] = (Math.random() - 0.5) * 8 - 4;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffd0e0, size: 0.04, transparent: true, opacity: 0.7 });
scene.add(new THREE.Points(starGeo, starMat));
// ── Animation loop ───────────────────────────────────────────────────────
let startTime = null;
let clock = 0;
function animate(timestamp) {
  requestAnimationFrame(animate);
  if (!startTime) startTime = timestamp;
  const elapsed = (timestamp - startTime) / 1000; // seconds since start
  clock += 0.008;
  // ── Bloom Animation ──────────────────────────────────────────────────
  petalAnimData.forEach(data => {
    const { group, bloomDelay, bloomDuration, targetTilt, startTilt,
            targetScaleY, startScaleY, swayPhase, swayAmount, layer } = data;
    // Calculate bloom progress for this petal (0 = closed, 1 = fully open)
    let t = (elapsed - bloomDelay) / bloomDuration;
    t = Math.max(0, Math.min(1, t)); // clamp 0–1
    // Apply easing for natural organic feel
    const easedT = easeInOutQuart(t);
    // Interpolate tilt (rotation.x): from closed to target
    const currentTilt = startTilt + (targetTilt - startTilt) * easedT;
    // Add gentle breathing/sway after bloom
    const breathe = t >= 1 ? Math.sin(clock * 0.5 + swayPhase) * swayAmount : 0;
    group.rotation.x = currentTilt + breathe;
    // Interpolate scale Y: from small bud to full petal
    const currentScaleY = startScaleY + (targetScaleY - startScaleY) * easedT;
    group.scale.y = currentScaleY;
    // Subtle scale pulse when fully bloomed
    if (t >= 1) {
      const pulse = 1 + Math.sin(clock * 0.3 + swayPhase) * 0.008;
      group.scale.x = pulse;
      group.scale.z = pulse;
    }
  });
  // ── Stamen reveal (appears when inner petals start opening) ───────────
  const stamenRevealStart = 2.0; // seconds
  const stamenRevealDur   = 3.0;
  const stamenT = Math.max(0, Math.min(1, (elapsed - stamenRevealStart) / stamenRevealDur));
  const stamenEased = easeOutCubic(stamenT);
  stamenMeshes.forEach(m => {
    const s = stamenEased;
    m.scale.set(s, s, s);
    m.material.opacity = stamenEased;
  });
  // ── Inner glow intensifies during bloom ───────────────────────────────
  const glowProgress = Math.min(elapsed / 6, 1);
  innerGlow.intensity = easeOutCubic(glowProgress) * 2.5 + Math.sin(clock * 1.5) * 0.3;
  // ── Gentle sway ───────────────────────────────────────────────────────
  flowerGroup.rotation.z = Math.sin(clock * 0.7) * 0.04;
  flowerGroup.rotation.y = clock * 0.25;
  // ── Lights pulse ──────────────────────────────────────────────────────
  pinkLight.intensity  = 2.5 + Math.sin(clock * 1.3) * 0.8;
  roseLight.intensity  = 1.8 + Math.cos(clock * 0.9) * 0.6;
  greenLight.intensity = 1.2 + Math.sin(clock * 0.6) * 0.4;
  // ── Orbit camera slightly ─────────────────────────────────────────────
  camera.position.x = Math.sin(clock * 0.18) * 1.2;
  camera.position.y = 1 + Math.sin(clock * 0.12) * 0.3;
  camera.lookAt(0, 0.4, 0);
  renderer.render(scene, camera);
}
animate(0);
// ── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
