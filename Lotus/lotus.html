<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lotus</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 38%, rgba(255, 52, 105, .16), transparent 24%),
      radial-gradient(circle at 50% 55%, rgba(255, 194, 209, .08), transparent 36%),
      #050407;
    font-family: "Dancing Script", cursive;
  }

  #canvas-container, canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }

  #message {
    position: absolute;
    bottom: 6vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
  }

  #message .line1 {
    display: block;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    color: #ffc0d0;
    letter-spacing: .04em;
    text-shadow: 0 0 18px rgba(255, 100, 140, .85), 0 0 60px rgba(255, 40, 100, .35);
    opacity: 0;
    animation: fadeInUp 1.8s ease .6s forwards, textGlow 3s ease-in-out infinite alternate;
  }

  #message .hearts {
    display: block;
    margin-top: 6px;
    font-size: clamp(1rem, 2.4vw, 1.6rem);
    color: #ff6f91;
    letter-spacing: .28em;
    opacity: 0;
    text-shadow: 0 0 14px rgba(255, 90, 130, .8);
    animation: fadeInUp 1.8s ease 1s forwards, heartBeat 1.5s ease-in-out infinite;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes textGlow {
    from { filter: brightness(1); }
    to { filter: brightness(1.22); }
  }

  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .petal-particle {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 12px;
    border-radius: 70% 20% 70% 20%;
    opacity: 0;
    pointer-events: none;
    animation: petalFall linear infinite;
  }

  @keyframes petalFall {
    0% { transform: translateY(-30px) translateX(0) rotate(0deg); opacity: 0; }
    12% { opacity: .65; }
    100% { transform: translateY(110vh) translateX(80px) rotate(620deg); opacity: 0; }
  }

  #loveText {
    position: absolute;
    top: 25vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    font-size: clamp(2rem, 4vw, 4rem);
    color: #ffc0d0;
    letter-spacing: .06em;
    text-shadow: 0 0 20px rgba(255, 100, 140, .9), 0 0 60px rgba(255, 40, 100, .5);
    opacity: 0;
    font-family: "Dancing Script", cursive;
    font-weight: 700;
  }

  #loveText.show {
    animation: fadeInScale 1s ease forwards;
  }

  @keyframes fadeInScale {
    from { opacity: 0; transform: translateX(-50%) scale(0.8); }
    to { opacity: 0.8; transform: translateX(-50%) scale(1); }
  }
</style>
</head>
<body>
<div id="canvas-container">
  <canvas id="webgl"></canvas>
  <div id="particles"></div>
  <div id="loveText">Name <3</div>
  <div id="message">
    <span class="line1">Lotus</span>
    <span class="hearts">❤ ❤ ❤</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const particles = document.getElementById("particles");
const particleColors = ["#ff5f8c", "#ff8fb0", "#ffc1d3", "#ff477e"];
for (let i = 0; i < 34; i++) {
  const p = document.createElement("div");
  p.className = "petal-particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
  p.style.animationDuration = 8 + Math.random() * 10 + "s";
  p.style.animationDelay = Math.random() * 12 + "s";
  p.style.transform = "scale(" + (0.55 + Math.random() * 0.9) + ")";
  particles.appendChild(p);
}

const canvas = document.getElementById("webgl");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070309, 0.045);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2.05, 9.4);
camera.lookAt(0, 0.25, 0);

scene.add(new THREE.AmbientLight(0x2b1018, 1.15));

const keyLight = new THREE.SpotLight(0xffb4c8, 3.8, 26, Math.PI / 5, 0.45, 1.1);
keyLight.position.set(-3.2, 6, 5);
keyLight.castShadow = true;
scene.add(keyLight);

const rimLight = new THREE.PointLight(0xff2f68, 2.8, 16);
rimLight.position.set(3.2, 2.6, 2.5);
scene.add(rimLight);

const stemLight = new THREE.PointLight(0x3cff96, 1.4, 12);
stemLight.position.set(-2.2, -1.3, 2.4);
scene.add(stemLight);

const innerGlow = new THREE.PointLight(0xffc477, 0.95, 4);
innerGlow.position.set(0, 0.2, 0);
scene.add(innerGlow);

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function easeOutBack(t) {
  const c1 = 1.25;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function makeTube(points, color, radius, opacity = 1) {
  const curve = new THREE.CatmullRomCurve3(points);
  const geo = new THREE.TubeGeometry(curve, 42, radius, 10, false);
  const mat = new THREE.MeshStandardMaterial({
    color,
    roughness: 0.42,
    metalness: 0.05,
    transparent: opacity < 1,
    opacity,
    emissive: color,
    emissiveIntensity: 0.08
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  return mesh;
}

const rose = new THREE.Group();
scene.add(rose);

const stem = makeTube([
  new THREE.Vector3(0, -3.25, 0),
  new THREE.Vector3(0.18, -2.2, 0.1),
  new THREE.Vector3(-0.08, -1.15, 0.03),
  new THREE.Vector3(0, -0.22, 0)
], 0x2e9b4b, 0.055);
rose.add(stem);

function makeLeaf(side, y, zRot) {
  const group = new THREE.Group();
  group.position.set(0, y, 0);
  group.rotation.z = zRot;

  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.bezierCurveTo(side * 0.38, 0.22, side * 0.82, 0.38, side * 1.28, 0.25);
  shape.bezierCurveTo(side * 0.7, 0.02, side * 0.34, -0.08, 0, 0);

  const geo = new THREE.ShapeGeometry(shape, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x2da650,
    side: THREE.DoubleSide,
    roughness: 0.65,
    metalness: 0.02,
    emissive: 0x0c341c,
    emissiveIntensity: 0.16
  });
  const leaf = new THREE.Mesh(geo, mat);
  leaf.rotation.x = -0.28;
  leaf.castShadow = true;
  group.add(leaf);

  group.add(makeTube([
    new THREE.Vector3(0, 0, 0.01),
    new THREE.Vector3(side * 1.05, 0.22, 0.03)
  ], 0x7bd67a, 0.012, 0.9));

  rose.add(group);
}

makeLeaf(1, -1.85, 0.15);
makeLeaf(-1, -1.55, -0.08);
makeLeaf(1, -0.95, -0.08);

const flower = new THREE.Group();
flower.position.set(0, -0.12, 0);
flower.rotation.x = -0.16;
rose.add(flower);

function createPetalGeometry(width, height, curl) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.bezierCurveTo(-width * 0.52, height * 0.18, -width * 0.62, height * 0.66, -width * 0.12, height);
  shape.bezierCurveTo(-width * 0.03, height * 1.04, width * 0.03, height * 1.04, width * 0.12, height);
  shape.bezierCurveTo(width * 0.62, height * 0.66, width * 0.52, height * 0.18, 0, 0);

  const geo = new THREE.ShapeGeometry(shape, 42);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const yNorm = y / height;
    const edge = Math.abs(x) / width;

    pos.setZ(i, Math.sin(yNorm * Math.PI) * curl - edge * 0.05);
    pos.setX(i, x * (0.72 + yNorm * 0.36));
  }
  geo.computeVertexNormals();
  return geo;
}

function petalMaterial(color, emissive, opacity = 0.96) {
  return new THREE.MeshPhysicalMaterial({
    color,
    emissive,
    emissiveIntensity: 0.12,
    roughness: 0.5,
    metalness: 0.02,
    clearcoat: 0.35,
    clearcoatRoughness: 0.65,
    side: THREE.DoubleSide,
    transparent: true,
    opacity
  });
}

const petalData = [];
const layerConfig = [
  { count: 6,  width: 0.58, height: 0.95, curl: 0.22, radius: 0.05, tilt: 0.45, color: 0xff2a57 },
  { count: 8,  width: 0.68, height: 1.15, curl: 0.26, radius: 0.09, tilt: 0.72, color: 0xff3f72 },
  { count: 10, width: 0.82, height: 1.38, curl: 0.30, radius: 0.15, tilt: 0.98, color: 0xff6390 },
  { count: 12, width: 0.98, height: 1.58, curl: 0.33, radius: 0.22, tilt: 1.22, color: 0xff88aa },
  { count: 14, width: 1.14, height: 1.75, curl: 0.36, radius: 0.30, tilt: 1.38, color: 0xffb2c4 }
];

layerConfig.forEach((cfg, layer) => {
  for (let i = 0; i < cfg.count; i++) {
    const angle = (i / cfg.count) * Math.PI * 2 + layer * 0.31;
    const petal = new THREE.Mesh(
      createPetalGeometry(cfg.width, cfg.height, cfg.curl),
      petalMaterial(cfg.color, cfg.color)
    );

    petal.position.set(Math.cos(angle) * cfg.radius, 0, Math.sin(angle) * cfg.radius);
    petal.rotation.order = "YXZ";
    petal.rotation.y = angle;
    petal.rotation.x = 0.1;
    petal.rotation.z = (Math.random() - 0.5) * 0.08;
    petal.scale.set(0.28, 0.12, 0.28);
    petal.castShadow = true;
    petal.receiveShadow = true;

    petal.userData = {
      layer,
      angle,
      radius: cfg.radius,
      finalTilt: cfg.tilt,
      finalScale: 0.78 + layer * 0.11,
      delay: layer * 0.42 + i * 0.018
    };

    flower.add(petal);
    petalData.push(petal);
  }
});

const core = new THREE.Group();
for (let i = 0; i < 22; i++) {
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.035 + Math.random() * 0.018, 10, 10),
    new THREE.MeshStandardMaterial({
      color: 0xffd66d,
      emissive: 0xff9a2e,
      emissiveIntensity: 0.35,
      roughness: 0.35
    })
  );
  const a = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.18;
  dot.position.set(Math.cos(a) * r, 0.08 + Math.random() * 0.08, Math.sin(a) * r);
  core.add(dot);
}
flower.add(core);

const starGeo = new THREE.BufferGeometry();
const starCount = 360;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i += 3) {
  starPos[i] = (Math.random() - 0.5) * 18;
  starPos[i + 1] = (Math.random() - 0.5) * 12 + 1.5;
  starPos[i + 2] = -2.5 - Math.random() * 8;
}
starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({
    color: 0xffd6e4,
    size: 0.045,
    transparent: true,
    opacity: 0.62
  })
);
scene.add(stars);

let time = 0;
let loveTextShown = false;
function animate() {
  requestAnimationFrame(animate);
  time += 0.009;

  const bloom = Math.min(time / 5.8, 1);
  petalData.forEach((petal) => {
    const p = Math.max(0, Math.min(1, (bloom - petal.userData.delay / 6.5) * 1.35));
    const e = easeOutBack(p);
    const calm = easeOutCubic(p);

    const angle = petal.userData.angle;
    const layer = petal.userData.layer;
    const radius = petal.userData.radius * (0.65 + calm * 0.9);

    petal.position.x = Math.cos(angle) * radius;
    petal.position.z = Math.sin(angle) * radius;
    petal.position.y = layer * 0.055 + calm * 0.08;

    petal.rotation.y = angle;
    petal.rotation.x = 0.15 + calm * petal.userData.finalTilt;
    petal.rotation.z = Math.sin(time * 0.45 + angle) * 0.035;

    const s = 0.3 + e * petal.userData.finalScale;
    petal.scale.set(s, s, s);
  });

  if (bloom >= 1) {
    const breathe = Math.sin(time * 0.7) * 0.025;
    flower.scale.set(1 + breathe, 1 + breathe, 1 + breathe);
    
    if (!loveTextShown) {
      const loveText = document.getElementById('loveText');
      loveText.classList.add('show');
      loveTextShown = true;
    }
  }

  rose.rotation.z = Math.sin(time * 0.6) * 0.035;
  rose.rotation.y = Math.sin(time * 0.25) * 0.16;
  flower.rotation.y += 0.0035;

  keyLight.intensity = 3.4 + Math.sin(time * 1.1) * 0.35;
  rimLight.intensity = 2.3 + Math.cos(time * 0.8) * 0.35;
  innerGlow.intensity = 0.75 + Math.sin(time * 1.5) * 0.18;

  stars.rotation.y += 0.0008;
  stars.material.opacity = 0.48 + Math.sin(time * 0.9) * 0.14;

  camera.position.x = Math.sin(time * 0.18) * 0.8;
  camera.position.y = 1.65 + Math.sin(time * 0.11) * 0.25;
  camera.lookAt(0, 0.12, 0);

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
